<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduFuture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-text">Edu<span class="logo-highlight">Future</span></a>
            </div>
            <div class="nav-buttons">
                <a href="index.html" class="btn-outline">Home</a>
                <a href="login.html" class="btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p>Start your journey to a brighter future</p>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" placeholder="Last name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create password" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="regGender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option></select>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="regDOB">
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="regPhone" placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="regAddress" placeholder="Enter your address">
                </div>
                <button type="submit" class="btn-primary btn-full">Create Account</button>
            </form>
            <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
